services:
  - type: web
    name: data-service
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: GATEWAY_ORIGIN
        value: "*"
